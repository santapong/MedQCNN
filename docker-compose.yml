# ──────────────────────────────────────────────
# MedQCNN — Docker Compose
# Services: API Server + PostgreSQL + Kafka
# ──────────────────────────────────────────────

services:
  # --- MedQCNN API Server ---
  medqcnn-api:
    build: .
    container_name: medqcnn-api
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://medqcnn:medqcnn@postgres:5432/medqcnn
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G # Edge-compute constraint

  # --- PostgreSQL Database ---
  postgres:
    image: postgres:16-alpine
    container_name: medqcnn-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=medqcnn
      - POSTGRES_PASSWORD=medqcnn
      - POSTGRES_DB=medqcnn
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medqcnn"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # --- Apache Kafka ---
  kafka:
    image: bitnami/kafka:latest
    container_name: medqcnn-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - kafka_data:/bitnami/kafka
    restart: unless-stopped

volumes:
  postgres_data:
  kafka_data:
